{% load static %}

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link rel="apple-touch-icon" sizes="76x76" href="{{ brand_preferences.favicon_url }}">
<link rel="icon" href="{{ brand_preferences.favicon_url }}">

<title>
  {{ brand_preferences.brand_name }}
</title>

<!--     Fonts and icons     -->
<link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

<!-- Nucleo Icons -->
<link href="{% static "assets/css/nucleo-icons.css" %}" rel="stylesheet" />
<link href="{% static "assets/css/nucleo-svg.css" %}" rel="stylesheet" />

<!-- Font Awesome Icons -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/js/all.min.js" crossorigin="anonymous"></script>

<!-- Material Icons -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

<!-- CSS Files -->
<link id="pagestyle" href="{% static "assets/css/material-dashboard.css" %}?v=3.2.0" rel="stylesheet" />
<link href="{% static "assets/css/mola-pro-brand.css" %}" rel="stylesheet" />

<script defer src="{% static "assets/js/mola-pro-processing.js" %}"></script>

<style>
    :root {
        {% for css_variable, css_value in brand_preferences.palette.css_variables.items %}
        {{ css_variable }}: {{ css_value }};
        {% endfor %}
    }
</style>
