{% load static %}

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link rel="apple-touch-icon" sizes="76x76" href="{{ brand_preferences.favicon_url }}">
<link rel="icon" href="{{ brand_preferences.favicon_url }}">

<title>
  {{ brand_preferences.brand_name }}
</title>

<!--     Fonts and icons     -->
<link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700,900" />
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!-- Nucleo Icons -->
<link href="{% static "assets/css/nucleo-icons.css" %}" rel="stylesheet" />
<link href="{% static "assets/css/nucleo-svg.css" %}" rel="stylesheet" />

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


<!-- Adicione as dependências do DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.2.9/css/responsive.bootstrap5.min.css">


<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
{{ brand_preferences.client_locale|json_script:"molaLocaleConfig" }}
<script defer src="{% static "assets/js/mola-pro-locale.js" %}"></script>
<script defer src="{% static "assets/js/mola-pro-processing.js" %}"></script>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>


<script src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>

<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>



<!-- Font Awesome Icons -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
<!-- Material Icons -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<!-- CSS Files -->
 {% comment %} <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" /> {% endcomment %}
<link id="pagestyle" href="{% static "assets/css/material-dashboard.css" %}?v=3.2.0" rel="stylesheet" />
<link href="{% static "assets/css/mola-pro-brand.css" %}" rel="stylesheet" />

{% comment %} <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script> {% endcomment %}

<style>
    :root {
        {% for css_variable, css_value in brand_preferences.palette.css_variables.items %}
        {{ css_variable }}: {{ css_value }};
        {% endfor %}
    }

    /* Cor para o menu activo */
    .nav-link.active,
    .nav-link.active span,
    .nav-link.active i.material-symbols-rounded {
        background-color: var(--mola-pro-primary-active) !important;
        color: #ffffff !important;
        border-radius: 8px;
    }

    /* Para sub-menus dentro de collapses */
    .nav .nav-link.active {
        background-color: var(--mola-pro-primary-active) !important;
        color: #ffffff !important;
    }

    /* Ícones dentro dos activos */
    .nav-link.active i {
        color: #ffffff !important;
    }

    /* Quando o collapse está aberto e tem filhos activos */
    .collapse.show > ul > li > a.active {
        background-color: var(--mola-pro-primary-active) !important;
        color: #ffffff !important;
    }

    /* Remove interferências do Material Dashboard */
    .sidenav .navbar-nav .nav-item .nav-link.active:after {
        display: none !important;
    }
</style>
